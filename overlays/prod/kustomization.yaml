apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: registry.ocp4.cn/redhat/ft-rest-service
    newTag: 2.0.0

patches:
  - target:
      kind: Route
      name: ft-rest-service
    patch: |-
      - op: replace
        path: /spec/host
        value: ft-rest-service.apps.prod.ocp4.cn

configMapGenerator:
  - name: ft-rest-service-config
    behavior: merge
    literals:
      - log_level=info
